<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arkod</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="lib/xterm.css" />
</head>
<body>
  <div id="app">
    <div id="activity-bar">
      <button class="activity-tab active" data-tab="chats" title="Chats">💬</button>
      <button class="activity-tab" data-tab="git" title="Git">⎇</button>
      <div class="activity-spacer"></div>
      <button class="activity-tab" data-tab="settings" title="Settings">⚙</button>
    </div>
    <div id="sidebar">
      <div id="sidebar-chats" class="sidebar-panel active">
        <div id="sessions-section">
          <div id="sidebar-header">
            <span>Chats</span>
            <button id="new-session" title="New session">+</button>
          </div>
          <div id="session-list"></div>
        </div>
        <div class="sash sash-horizontal" id="sash-sidebar-inner"></div>
        <div id="files-section">
          <div id="sidebar-header">
            <span>Files</span>
            <button id="open-file-btn" title="Open file">+</button>
          </div>
          <div id="file-tree"></div>
        </div>
      </div>
      <div id="sidebar-git" class="sidebar-panel">
        <div id="git-sidebar-branches-section">
          <div class="git-sidebar-header">Branches</div>
          <div id="git-branch-list"></div>
        </div>
        <div class="sash sash-horizontal" id="sash-git-sidebar"></div>
        <div id="git-sidebar-stashes-section">
          <div class="git-sidebar-header">Stashes</div>
          <div id="git-stash-list"></div>
        </div>
      </div>
      <div id="sidebar-settings" class="sidebar-panel">
      </div>
    </div>
    <div class="sash sash-vertical" id="sash-sidebar"></div>
    <div id="main">
      <div id="cwd-bar">
        <button id="sidebar-toggle" title="Toggle sidebar (Ctrl+B)">☰</button>
        <span id="cwd-label" title="Click to change directory">📁</span>
        <span id="cwd-path"></span>
        <button id="term-toggle" title="Toggle terminal (Ctrl+`)">Term</button>
      </div>
      <div id="content-area">
        <div id="view-chats" class="main-view active">
          <div id="response"></div>
          <div id="editor-panel">
            <div id="editor-header">
              <span id="editor-file-name"></span>
              <span id="editor-lang-status"></span>
              <button id="editor-close-btn" title="Close editor">x</button>
            </div>
            <div id="editor"></div>
            <div id="editor-statusbar">
              <span id="editor-lang-label"></span>
              <span id="editor-position"></span>
            </div>
          </div>
        </div>
        <div id="view-git" class="main-view">
          <div id="git-not-repo" class="panel-placeholder" style="height:100%;display:none;align-items:center;justify-content:center">
            <p>Not a Git repository. Open a directory with a .git folder.</p>
          </div>
          <div id="git-content" style="display:none;flex:1;flex-direction:column;overflow:hidden">
            <div id="git-branch-bar">
              <span id="git-branch-icon">⎇</span>
              <span id="git-branch-name"></span>
              <button id="git-refresh-btn" title="Refresh">↻</button>
            </div>
            <div id="git-main-area">
              <div id="git-staging-section">
                <div class="git-section">
                  <div class="git-section-header">
                    <span class="git-section-title">Changes</span>
                    <button class="git-stage-all-btn" title="Stage all changes">+</button>
                  </div>
                  <div id="git-unstaged-list" class="git-file-list"></div>
                  <div class="git-section-header" style="margin-top:8px">
                    <span class="git-section-title">Untracked</span>
                  </div>
                  <div id="git-untracked-list" class="git-file-list"></div>
                </div>
                <div class="git-section" id="git-staged-section" style="display:none">
                  <div class="git-section-header">
                    <span class="git-section-title">Staged Changes</span>
                    <button class="git-unstage-all-btn" title="Unstage all changes">−</button>
                  </div>
                  <div id="git-staged-list" class="git-file-list"></div>
                  <div id="git-commit-area">
                    <input id="git-commit-msg" type="text" placeholder="Commit message..." />
                    <button id="git-commit-btn" class="git-commit-btn">Commit</button>
                  </div>
                </div>
              </div>
              <div id="git-history-section">
                <div class="git-section-header">
                  <span class="git-section-title">History</span>
                </div>
                <div id="git-log-list"></div>
              </div>
            </div>
            <div id="git-diff-panel" style="display:none">
              <div id="git-diff-header">
                <span id="git-diff-label"></span>
                <button id="git-diff-close-btn" title="Close diff">×</button>
              </div>
              <div id="git-diff-content" class="diff-container"></div>
            </div>
          </div>
        </div>
        <div id="view-settings" class="main-view">
          <div class="settings-content" style="max-width:480px;margin:0 auto;padding:16px">
            <div class="settings-section">
              <div class="settings-label">Model</div>
              <span id="settings-model" style="font-size:12px;color:#ccc;font-family:monospace"></span>
            </div>
            <div class="settings-section" style="margin-top:16px">
              <div class="settings-label">Providers</div>
              <div id="auth-list"></div>
              <div id="auth-form" style="display:none;margin-top:8px">
                <select id="auth-provider" style="width:100%;padding:4px;background:#3c3c3c;color:#ccc;border:1px solid #555;border-radius:3px;font-size:11px;margin-bottom:4px">
                  <option value="">Select provider...</option>
                </select>
                <input id="auth-key" type="password" placeholder="API key" style="width:100%;padding:4px;background:#3c3c3c;color:#ccc;border:1px solid #555;border-radius:3px;font-size:11px;margin-bottom:4px;box-sizing:border-box" />
                <div style="display:flex;gap:4px">
                  <button id="auth-save-btn" class="settings-btn">Save</button>
                  <button id="auth-cancel-btn" class="settings-btn" style="background:#444">Cancel</button>
                </div>
              </div>
              <button id="add-auth-btn" class="settings-btn" style="margin-top:8px">+ Connect provider</button>
            </div>
            <div class="settings-section" style="margin-top:16px">
              <div class="settings-label">Sessions</div>
              <button id="delete-all-sessions-btn" class="settings-btn danger">Delete All Sessions</button>
            </div>
          </div>
        </div>
      </div>
      <div class="sash sash-horizontal" id="sash-terminal"></div>
      <div id="terminal-panel">
        <div id="terminal-header">
          <div id="terminal-tabs"></div>
          <button id="terminal-add-btn" title="New terminal">+</button>
        </div>
        <div id="terminal"></div>
      </div>
      <div id="input-area">
        <div id="input-bar">
          <div id="input-wrapper">
            <textarea id="prompt" placeholder="Ask something..." rows="2"></textarea>
            <div id="busy-indicator" class="busy-hidden"></div>
          </div>
        </div>
        <div id="token-bar">
          <span id="model-info"></span>
          <span id="token-info"></span>
        </div>
      </div>
    </div>
  </div>

  <div id="confirm-overlay" class="confirm-hidden">
    <div class="confirm-box">
      <div class="confirm-message"></div>
      <div class="confirm-actions">
        <button class="confirm-btn confirm-cancel">Cancel</button>
        <button class="confirm-btn confirm-ok danger-btn">Delete</button>
      </div>
    </div>
  </div>

  <script src="lib/xterm.js"></script>
  <script src="lib/addon-fit.js"></script>
  <script src="bundle/editor-bundle.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
