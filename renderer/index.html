<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arkod</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="lib/xterm.css" />
</head>
<body>
  <div id="app">
    <div id="activity-bar">
      <button class="activity-tab active" data-tab="chats" title="Chats">💬</button>
      <button class="activity-tab" data-tab="search" title="Search">🔍</button>
      <button class="activity-tab" data-tab="git" title="Git">⎇</button>
      <div class="activity-spacer"></div>
      <button id="theme-toggle-btn" class="activity-tab" title="Toggle Light/Dark Theme">🌓</button>
      <button class="activity-tab" data-tab="settings" title="Settings">⚙</button>
    </div>
    <div id="sidebar">
      <div id="sidebar-chats" class="sidebar-panel active">
        <div id="sessions-section">
          <div id="sidebar-header">
            <span>Chats</span>
            <button id="new-session" title="New session">+</button>
          </div>
          <div id="session-list"></div>
        </div>
        <div class="sash sash-horizontal" id="sash-sidebar-inner"></div>
        <div id="files-section">
          <div id="sidebar-header">
            <span>Files</span>
            <div id="files-header-actions">
              <button id="new-file-btn" title="New File…">📄</button>
              <button id="new-folder-btn" title="New Folder…">📁</button>
              <button id="delete-btn" title="Delete active file…" disabled>🗑</button>
            </div>
          </div>
          <div id="file-tree"></div>
        </div>
      </div>
      <div id="sidebar-search" class="sidebar-panel">
        <div id="search-input-area">
          <div id="search-input-row">
            <input id="search-query" type="text" placeholder="Search..." />
            <div id="search-toggles">
              <button id="search-case-btn" class="search-toggle" title="Match Case">Aa</button>
              <button id="search-word-btn" class="search-toggle" title="Match Whole Word">ab</button>
              <button id="search-regex-btn" class="search-toggle" title="Use Regular Expression">.*</button>
            </div>
          </div>
        </div>
        <div id="search-results"></div>
      </div>
      <div id="sidebar-git" class="sidebar-panel">
        <div id="git-sidebar-branches-section">
          <div class="git-sidebar-header">Branches</div>
          <div id="git-branch-list"></div>
        </div>
        <div class="sash sash-horizontal" id="sash-git-sidebar"></div>
        <div id="git-sidebar-stashes-section">
          <div class="git-sidebar-header">Stashes</div>
          <div id="git-stash-list"></div>
        </div>
      </div>
      <div id="sidebar-settings" class="sidebar-panel">
      </div>
    </div>
    <div class="sash sash-vertical" id="sash-sidebar"></div>
    <div id="main">
      <div id="cwd-bar">
        <button id="sidebar-toggle" title="Toggle sidebar (Ctrl+B)">☰</button>
        <span id="cwd-label" title="Click to change directory">📁</span>
        <span id="cwd-path"></span>
        <button id="term-toggle" title="Toggle terminal (Ctrl+`)">Term</button>
      </div>
      <div id="content-area">
        <div id="view-chats" class="main-view active">
          <div id="response"></div>
          <div class="sash sash-vertical" id="sash-editor"></div>
          <div id="editor-panel">
            <div id="editor-header">
              <div id="editor-tabs"></div>
              <span id="editor-lang-status"></span>
              <button id="editor-md-toggle" title="Toggle preview" hidden></button>
              <button id="editor-close-btn" title="Close editor">×</button>
            </div>
            <div id="editor">
              <div id="editor-md-preview"></div>
              <div id="editor-media-view"></div>
            </div>
            <div id="editor-statusbar">
              <span id="editor-lang-label"></span>
              <span id="editor-position"></span>
            </div>
          </div>
        </div>
        <div id="view-git" class="main-view">
          <div id="git-not-repo" style="height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px">
            <span style="font-size:48px;opacity:0.3">⎇</span>
            <p style="color:#94a3b8;font-size:13px;margin:0">No Git repository found in this folder.</p>
            <p style="color:#64748b;font-size:11px;margin:0">Run <code style="background:#1c1a2e;padding:1px 4px;border-radius:2px">git init</code> or open a directory that contains a .git folder.</p>
          </div>
          <div id="git-content" style="display:none;flex:1;flex-direction:column;overflow:hidden">
            <div id="git-branch-bar">
              <span id="git-branch-icon">⎇</span>
              <span id="git-branch-name"></span>
              <div id="git-branch-actions">
                <button id="git-fetch-btn" class="git-action-btn" title="Fetch all remotes">⇣ Fetch</button>
                <button id="git-pull-btn" class="git-action-btn" title="Pull from remote">↓ Pull</button>
                <button id="git-push-btn" class="git-action-btn" title="Push to remote">↑ Push</button>
                <button id="git-rebase-btn" class="git-action-btn" title="Rebase onto branch">↻ Rebase</button>
                <button id="git-merge-btn" class="git-action-btn" title="Merge branch">⊔ Merge</button>
              </div>
              <button id="git-refresh-btn" title="Refresh">↻</button>
            </div>
            <div id="git-merge-banner" style="display:none">
              <span class="git-merge-banner-icon">⚠</span>
              <span id="git-merge-banner-text">Merge conflicts</span>
              <div class="git-merge-banner-actions">
                <button id="git-merge-abort-btn" class="git-merge-banner-btn" title="Abort merge/rebase">Abort</button>
              </div>
            </div>
            <div id="git-main-area">
              <div id="git-staging-section">
                <div class="git-section">
                  <div class="git-section-header">
                    <span class="git-section-title">Changes</span>
                    <div class="git-section-actions">
                      <button id="git-discard-all-btn" class="git-discard-all-btn" title="Discard all changes">⊗ Discard All</button>
                      <button id="git-stage-all-btn" class="git-stage-all-btn" title="Stage all changes">+</button>
                    </div>
                  </div>
                  <div id="git-unstaged-list" class="git-file-list"></div>
                </div>
                <div class="git-section" id="git-staged-section" style="display:none">
                  <div class="git-section-header">
                    <span class="git-section-title">Staged Changes</span>
                    <button id="git-unstage-all-btn" class="git-unstage-all-btn" title="Unstage all changes">−</button>
                  </div>
                  <div id="git-staged-list" class="git-file-list"></div>
                  <div id="git-commit-area">
                    <input id="git-commit-msg" type="text" placeholder="Commit message..." />
                    <button id="git-commit-btn" class="git-commit-btn">Commit</button>
                    <button id="git-commit-gen-btn" class="git-commit-gen-btn" title="Generate commit message with AI, commit and push" disabled>✦ Gen & Push</button>
                  </div>
                </div>
              </div>
              <div id="git-history-section">
                <div class="git-section-header">
                  <span class="git-section-title">History</span>
                </div>
                <div id="git-log-list"></div>
              </div>
            </div>
            <div id="git-diff-panel" style="display:none">
              <div id="git-diff-header">
                <span id="git-diff-label"></span>
                <button id="git-diff-close-btn" title="Close diff">×</button>
              </div>
              <div id="git-diff-content" class="diff-container"></div>
            </div>
            <div id="git-conflict-panel" style="display:none">
              <div id="git-conflict-header">
                <span id="git-conflict-label"></span>
                <div class="git-conflict-actions">
                  <button id="git-conflict-accept-all-ours" class="git-conflict-bulk-btn" title="Accept all Current (HEAD) versions">All Current</button>
                  <button id="git-conflict-accept-all-theirs" class="git-conflict-bulk-btn" title="Accept all Incoming versions">All Incoming</button>
                  <button id="git-conflict-stage-btn" class="git-conflict-finish-btn" disabled>Stage &amp; Finish</button>
                  <button id="git-conflict-close-btn" title="Close">×</button>
                </div>
              </div>
              <div id="git-conflict-content"></div>
            </div>
          </div>
        </div>
        <div id="view-startup" class="main-view">
          <button id="startup-settings-btn" title="Settings">⚙</button>
          <div class="startup-container">
            <div class="startup-hero">
              <div class="startup-logo">Arkod</div>
              <div class="startup-tagline">Code, chat, ship.</div>
            </div>
            <div class="startup-recent">
              <div class="startup-section-title">Recent Projects</div>
              <div id="startup-recent-list"></div>
            </div>
            <div class="startup-actions">
              <button id="startup-open-folder" class="startup-btn">📁 Open Folder…</button>
            </div>
          </div>
        </div>
        <div id="view-settings" class="main-view">
          <div class="settings-content" style="max-width:480px;margin:0 auto;padding:16px">
            <div class="settings-section">
              <div class="settings-label">Model</div>
              <span id="settings-model" style="font-size:12px;color:#cbd5e1;font-family:monospace"></span>
            </div>
            <div class="settings-section" style="margin-top:16px">
              <div class="settings-label">Providers</div>
              <div id="auth-list"></div>
              <div id="auth-form" style="display:none;margin-top:8px">
                <select id="auth-provider" style="width:100%;padding:4px;background:#1c1a2e;color:#cbd5e1;border:1px solid #252536;border-radius:3px;font-size:11px;margin-bottom:4px">
                  <option value="">Select provider...</option>
                </select>
                <input id="auth-key" type="password" placeholder="API key" style="width:100%;padding:4px;background:#1c1a2e;color:#cbd5e1;border:1px solid #252536;border-radius:3px;font-size:11px;margin-bottom:4px;box-sizing:border-box" />
                <div style="display:flex;gap:4px">
                  <button id="auth-save-btn" class="settings-btn">Save</button>
                  <button id="auth-cancel-btn" class="settings-btn" style="background:#2d2d40">Cancel</button>
                </div>
              </div>
              <button id="add-auth-btn" class="settings-btn" style="margin-top:8px">+ Connect provider</button>
            </div>
            <div class="settings-section" style="margin-top:16px">
              <div class="settings-label">Interface</div>
              <label class="settings-toggle-label">
                <input type="checkbox" id="startup-auto-load-toggle" />
                <span>Always open last project on startup</span>
              </label>
            </div>
            <div class="settings-section" style="margin-top:16px">
              <div class="settings-label">MCP Servers</div>
              <div id="mcp-list"></div>
              <div id="mcp-form" style="display:none;margin-top:8px">
                <input id="mcp-name" type="text" placeholder="Server name" style="width:100%;padding:4px;background:#1c1a2e;color:#cbd5e1;border:1px solid #252536;border-radius:3px;font-size:11px;margin-bottom:4px;box-sizing:border-box" />
                <select id="mcp-scope" style="width:100%;padding:4px;background:#1c1a2e;color:#cbd5e1;border:1px solid #252536;border-radius:3px;font-size:11px;margin-bottom:4px">
                  <option value="global">Global (all projects)</option>
                  <option value="project">This project only</option>
                </select>
                <select id="mcp-type" style="width:100%;padding:4px;background:#1c1a2e;color:#cbd5e1;border:1px solid #252536;border-radius:3px;font-size:11px;margin-bottom:4px">
                  <option value="stdio">stdio</option>
                  <option value="sse">SSE / URL</option>
                </select>
                <div id="mcp-stdio-fields">
                  <input id="mcp-command" type="text" placeholder="Command (e.g. npx)" style="width:100%;padding:4px;background:#1c1a2e;color:#cbd5e1;border:1px solid #252536;border-radius:3px;font-size:11px;margin-bottom:4px;box-sizing:border-box" />
                  <input id="mcp-args" type="text" placeholder="Args (space-separated)" style="width:100%;padding:4px;background:#1c1a2e;color:#cbd5e1;border:1px solid #252536;border-radius:3px;font-size:11px;margin-bottom:4px;box-sizing:border-box" />
                  <input id="mcp-env" type="text" placeholder='Env vars (KEY=val,KEY2=val2)' style="width:100%;padding:4px;background:#1c1a2e;color:#cbd5e1;border:1px solid #252536;border-radius:3px;font-size:11px;margin-bottom:4px;box-sizing:border-box" />
                </div>
                <div id="mcp-sse-fields" style="display:none">
                  <input id="mcp-url" type="text" placeholder="URL (e.g. http://localhost:3001/sse)" style="width:100%;padding:4px;background:#1c1a2e;color:#cbd5e1;border:1px solid #252536;border-radius:3px;font-size:11px;margin-bottom:4px;box-sizing:border-box" />
                </div>
                <div style="display:flex;gap:4px">
                  <button id="mcp-save-btn" class="settings-btn">Save</button>
                  <button id="mcp-cancel-btn" class="settings-btn" style="background:#2d2d40">Cancel</button>
                </div>
              </div>
              <button id="add-mcp-btn" class="settings-btn" style="margin-top:8px">+ Add MCP Server</button>
            </div>
            <div class="settings-section" style="margin-top:16px">
              <div class="settings-label">Sessions</div>
              <button id="delete-all-sessions-btn" class="settings-btn danger">Delete All Sessions</button>
            </div>
            <div class="settings-section" style="margin-top:24px;opacity:0.5">
              <div class="settings-label">About</div>
              <span id="settings-version" style="font-size:11px;color:var(--text-dim);font-family:monospace"></span>
            </div>
          </div>
        </div>
      </div>
      <div class="sash sash-horizontal" id="sash-terminal"></div>
      <div id="terminal-panel">
        <div id="terminal-header">
          <div id="terminal-tabs"></div>
          <button id="terminal-add-btn" title="New terminal">+</button>
        </div>
        <div id="terminal"></div>
      </div>
      <div id="input-area">
        <div id="input-bar">
          <div id="input-wrapper">
            <textarea id="prompt" placeholder="Ask something..." rows="2"></textarea>
            <div id="busy-indicator" class="busy-hidden"></div>
          </div>
        </div>
        <div id="token-bar">
          <span id="model-info"></span>
          <span id="token-info"></span>
          <span id="git-branch-indicator" style="display:none"></span>
        </div>
      </div>
    </div>
  </div>

  <div id="confirm-overlay" class="confirm-hidden">
    <div class="confirm-box">
      <div class="confirm-message"></div>
      <div class="confirm-actions">
        <button class="confirm-btn confirm-cancel">Cancel</button>
        <button class="confirm-btn confirm-ok danger-btn">Delete</button>
      </div>
    </div>
  </div>

  <script src="lib/xterm.js"></script>
  <script src="lib/addon-fit.js"></script>
  <script src="bundle/editor-bundle.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
